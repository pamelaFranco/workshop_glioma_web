# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# Basic Site Settings
locale                  : "es-CL"
site_theme              : "default" # The available themes options are "default", "air", "sunrise", "mint", "dirt" and "contrast"
title                   : "Workshop: IA Interpretable en Neurooncología"
title_separator         : "-"
name                    : &name "Workshop IA Neurooncología"
description             : &description "Decodificando la severidad tumoral mediante resonancia multimodal"
url                     : "https://pamelaFranco.github.io" # Mantener la URL base donde se desplegará en GitHub Pages
baseurl                 : "/workshop_glioma_web" 
repository              : "pamelaFranco/workshop_glioma_web"

# Site Author - Organizador Institucional
author:
  # Biographic information
  avatar           : "profile.png" 
  name             : "Comité Organizador"
  pronouns         : ""  
  bio              : "Espacio de difusión y laboratorios virtuales sobre IA e Interpretabilidad aplicada a la Neurooncología."
  location         : "Santiago, Chile"
  employer         : "UNAB - PUC - FALP"
  uri              : 
  email            : "neurooncologia.ia@gmail.com" 

  # Academic websites (Vacíos para mantenerlo institucional)
  academia         : 
  arxiv            : 
  googlescholar    : 
  inspire-hep      : 
  impactstory      : 
  orcid            : 
  semantic         : 
  ssrn             : 
  pubmed           : 

  # Repositories and software development
  github           : "pamelaFranco/workshop_glioma" # Organización o cuenta contenedora del código
  bitbucket        : 
  codepen          : 
  dribbble         : 
  kaggle           : 
  stackoverflow    : 

  # Social media
  bluesky          : 
  instagram        : "neuro_artint"
  linkedin         : 

publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                   : 
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               : false

staticman:
  allowedFields          : ['name', 'email', 'url', 'message']
  branch                 : "gh-pages"
  commitMessage          : "New comment."
  filename               : comment-{@timestamp}
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ['name', 'email', 'message']
  transforms:
    email                : "md5"
  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601"
atom_feed:
  hide                   : false
  path                   : 

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - CHANGELOG
  - Gemfile
  - LICENSE
  - README
  - node_modules
  - vendor
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  charlas:
    output: true
    permalink: /:collection/:path/
  publicaciones:
    output: true
    permalink: /:collection/:path/
  hands-on:
    output: true
    permalink: /:collection/:path/
  resumenes:
    output: true
    permalink: /:collection/:path/
  faq:
    output: true
    permalink: /:collection/:path/
  apoyos:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: America/Santiago

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development